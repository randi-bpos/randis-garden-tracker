<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Randi's Garden Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4ec;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: white;
      border: 1px solid #d4dfd0;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    .icon { font-size: 2.5rem; margin-bottom: 12px; }
    h1 { font-size: 1.4rem; color: #2d6a35; margin-bottom: 6px; font-weight: 700; }
    .subtitle { color: #6b7d6b; font-size: 0.9rem; margin-bottom: 28px; }
    label { display: block; text-align: left; font-size: 0.85rem; font-weight: 500; color: #1f2a1f; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #d4dfd0;
      border-radius: 8px;
      font: inherit;
      font-size: 0.95rem;
      margin-bottom: 16px;
      transition: border-color 0.15s, outline 0.15s;
    }
    input[type="password"]:focus {
      outline: 2px solid #2d6a35;
      outline-offset: 1px;
      border-color: transparent;
    }
    .btn {
      width: 100%;
      background: #2d6a35;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #235429; }
    .error { color: #c0392b; font-size: 0.85rem; margin-top: 12px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🌱</div>
    <h1>Randi's Garden Tracker</h1>
    <p class="subtitle">Enter your password to continue</p>
    <form id="login-form">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" autofocus />
      <button type="submit" class="btn">Log In</button>
      <p class="error" id="error-msg">Wrong password — try again.</p>
    </form>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });
      if (res.ok) {
        window.location.href = '/';
      } else {
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    });
  </script>
</body>
</html>
